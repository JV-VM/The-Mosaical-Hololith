services:
  postgres-e2e:
    image: postgres:16-alpine
    container_name: mosaical-hololith-postgres-e2e
    environment:
      POSTGRES_DB: mosaical_hololith_e2e
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '55432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d mosaical_hololith_e2e']
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - mosaical_hololith_postgres_e2e:/var/lib/postgresql/data

volumes:
  mosaical_hololith_postgres_e2e:
