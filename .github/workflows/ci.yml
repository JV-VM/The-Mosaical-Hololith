name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
          cache-dependency-path: 'mosaical-hololith-backend/pnpm-lock.yaml'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: npm run bootstrap

      - name: Verify backend
        run: npm run verify

      - name: Start e2e database
        run: docker compose -f mosaical-hololith-backend/docker-compose.e2e.yml up -d --wait postgres-e2e

      - name: Run database migrations
        run: npm run db:migrate:test

      - name: Run e2e tests
        run: npm run test:e2e

      - name: Shutdown e2e database
        if: always()
        run: docker compose -f mosaical-hololith-backend/docker-compose.e2e.yml down -v
